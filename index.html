<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entraînement">
<link rel="manifest" href="/manifest.json">
<title>Plan Entraînement Maison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f1117; color: #e8eaf0; font-family: Georgia, serif; min-height: 100vh; }
  button { font-family: Georgia, serif; cursor: pointer; }
  p { margin: 0; }

  .header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 1px solid #2a2f3f;
    padding: 28px 20px 20px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-sub { font-size: 11px; letter-spacing: 0.2em; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; font-family: monospace; }
  .header h1 { font-size: 22px; font-weight: 700; color: #f0f4ff; letter-spacing: -0.5px; }
  .tab-row { display: flex; gap: 8px; margin-top: 14px; }
  .tab-btn { padding: 6px 18px; border-radius: 20px; border: none; font-size: 13px; transition: all 0.2s; }

  .content { max-width: 720px; margin: 0 auto; padding: 18px 14px 60px; }

  .phase-grid { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .phase-btn { flex: 1 1 130px; padding: 11px 10px; border-radius: 12px; border: 2px solid #2a2f3f; background: #1a1f2e; text-align: left; transition: all 0.2s; }
  .phase-btn-label { font-size: 11px; font-family: monospace; letter-spacing: 0.1em; text-transform: uppercase; }
  .phase-btn-titre { font-size: 14px; font-weight: 700; color: #c9d1e0; margin-top: 2px; }
  .phase-btn-duree { font-size: 11px; color: #6b7280; margin-top: 2px; }

  .objectif-box { border-left: 3px solid; border-radius: 0 10px 10px 0; padding: 13px 15px; margin-bottom: 18px; background: #1a1f2e; }
  .objectif-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 5px; }
  .objectif-text { font-size: 14px; color: #c9d1e0; line-height: 1.6; }

  .day-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .day-btn { flex-shrink: 0; padding: 8px 14px; border-radius: 8px; border: 1.5px solid #2a2f3f; background: #1a1f2e; font-size: 13px; transition: all 0.2s; }

  .hint { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; font-size: 12px; color: #6b7280; }

  .ex-card { background: #1a1f2e; border-radius: 14px; border: 1px solid #ccc3; overflow: hidden; margin-bottom: 18px; }
  .ex-card-header { padding: 15px 17px; }
  .ex-card-phase-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; font-family: monospace; }
  .ex-card-title { font-size: 17px; font-weight: 700; color: #f0f4ff; margin-top: 4px; }
  .ex-list { padding: 4px 0; }
  .ex-row { padding: 13px 17px; transition: background 0.15s; }
  .ex-row-inner { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .ex-name { font-size: 15px; font-weight: 600; color: #f0f4ff; }
  .ex-badge { display: inline-block; margin-left: 6px; font-size: 10px; border-radius: 4px; padding: 1px 5px; font-family: monospace; vertical-align: middle; }
  .ex-note { font-size: 12px; color: #6b7280; margin-top: 4px; line-height: 1.5; }
  .ex-tags { display: flex; gap: 5px; flex-shrink: 0; }
  .tag-series { background: #252b3b; border-radius: 5px; padding: 3px 8px; font-size: 11px; font-family: monospace; }
  .tag-reps { background: #252b3b; border: 1px solid #3a4060; color: #9ca3af; border-radius: 5px; padding: 3px 8px; font-size: 11px; font-family: monospace; }

  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .repos-box { background: #13161f; border-radius: 10px; padding: 12px 13px; display: flex; gap: 9px; align-items: flex-start; }
  .repos-label { font-size: 11px; color: #6b7280; margin-bottom: 2px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; }
  .repos-val { font-size: 13px; color: #c9d1e0; }
  .prog-box { background: #1a1f2e; border-radius: 10px; padding: 12px 13px; border: 1px solid #2a2f3f; }
  .prog-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 4px; }
  .prog-text { font-size: 12px; color: #c9d1e0; line-height: 1.5; }

  /* Conseils */
  .conseil-card { background: #1a1f2e; border-radius: 12px; padding: 15px 17px; margin-bottom: 11px; border: 1px solid #2a2f3f; display: flex; gap: 13px; align-items: flex-start; }
  .conseil-emoji { font-size: 24px; flex-shrink: 0; }
  .conseil-titre { font-size: 15px; font-weight: 700; color: #f0f4ff; margin-bottom: 5px; }
  .conseil-text { font-size: 14px; color: #9ca3af; line-height: 1.6; }
  .objectifs-box { background: #1a1f2e; border-radius: 12px; padding: 17px; margin-top: 8px; border: 1px solid #3a4060; }
  .objectifs-title { font-size: 13px; font-weight: 700; color: #f0f4ff; margin-bottom: 13px; }
  .objectif-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #2a2f3f; font-size: 14px; }
  .objectif-row:last-child { border-bottom: none; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.78); display: flex; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-sheet { background: #1a1f2e; border-radius: 20px 20px 0 0; width: 100%; max-width: 720px; max-height: 88vh; overflow-y: auto; border-top: 1px solid #3a4060; border-left: 1px solid #2a2f3f; border-right: 1px solid #2a2f3f; -webkit-overflow-scrolling: touch; }
  .modal-handle-row { display: flex; justify-content: center; padding-top: 10px; }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: #3a4060; }
  .modal-header { padding: 13px 19px 12px; border-bottom: 1px solid #2a2f3f; }
  .modal-header-inner { display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; font-family: monospace; margin-bottom: 3px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #f0f4ff; line-height: 1.3; }
  .modal-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .modal-close { background: #252b3b; border: none; color: #9ca3af; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 12px; cursor: pointer; }
  .modal-body { padding: 15px 19px 36px; }
  .section-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 9px; }
  .muscles-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 17px; }
  .muscle-tag { border-radius: 20px; padding: 3px 10px; font-size: 12px; }
  .etapes-list { margin-bottom: 17px; }
  .etape-row { display: flex; gap: 11px; margin-bottom: 11px; }
  .etape-num { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; font-size: 11px; font-family: monospace; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .etape-text { font-size: 14px; color: #c9d1e0; line-height: 1.6; padding-top: 2px; }
  .tempo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 17px; }
  .tempo-box { background: #13161f; border-radius: 10px; padding: 11px 13px; }
  .tempo-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 4px; }
  .tempo-val { font-size: 13px; color: #e8eaf0; }
  .erreurs-list { margin-bottom: 17px; }
  .erreur-row { display: flex; gap: 9px; margin-bottom: 7px; align-items: flex-start; }
  .erreur-x { color: #f87171; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
  .erreur-text { font-size: 13px; color: #9ca3af; line-height: 1.5; }
  .conseil-box { border-radius: 10px; padding: 12px 13px; }
  .conseil-box-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 5px; }
  .conseil-box-text { font-size: 13px; color: #c9d1e0; line-height: 1.6; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/app.js"></script>
</body>
</html>
